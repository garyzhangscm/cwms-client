<nz-spin [nzSize]="'large'" [nzSpinning]="isSpinning">
  <nz-card [nzActions]="[cardFoot]">
    <form nz-form [formGroup]="configurationForm">
      <div nz-row [nzGutter]="24">
        <div nz-col [nzSpan]="8">
          <nz-form-item nzFlex>
            <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="cron">
              {{ 'inventory-snapshot.configuration.cron' | i18n }}
            </nz-form-label>
            <nz-form-control [nzSm]="14" [nzXs]="24" nzHasFeedback
              nzErrorTip="{{ 'error.form.field.required' | i18n }}">
              <input nz-input formControlName="cron" id="cron" name="cron" />
            </nz-form-control>
            <button nz-button nzType="primary" nzShape="circle" nz-popover
              nzPopoverTitle="{{ 'inventory-snapshot.configuration.cron' | i18n }}" [nzPopoverContent]="cronDescription"
              nzPopoverPlacement="rightTop">

              <i nz-icon nzType="question" nzTheme="outline"></i>
            </button>

          </nz-form-item>


        </div>
      </div>
    </form>

  </nz-card>
</nz-spin>
<ng-template #cardFoot>
  <div nz-row nzType="flex" [nzJustify]="'start'" style='padding-left: 20px;'>
    <button nz-button nzType="primary" (click)="saveConfiguration()">
      {{ 'confirm' | i18n }}
    </button>
    <nz-divider nzType="vertical"></nz-divider>
    <button nz-button nzType="primary" (click)="generateInventorySnapshot()">
      {{ 'inventory-snapshot.generate' | i18n }}
    </button>
  </div>
</ng-template>

<ng-template #cronDescription>
  <div>{{ 'inventory-snapshot.configuration.cron.description' | i18n }}
  </div>
</ng-template>
