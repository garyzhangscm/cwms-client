<page-header></page-header>

<!-- Form to query the result  -->
<form nz-form [formGroup]="searchForm" class="ant-advanced-search-form">
  <div nz-row [nzGutter]="24">

    <div nz-col [nzSpan]="12">
      <nz-form-item nzFlex>
        <nz-form-label for="client" [nzSm]="3" [nzXs]="3">
          {{ 'client' | translate }}
        </nz-form-label>
        <nz-select nzMode="tags" formControlName="taggedClients">
          <nz-option *ngFor="let client of clients" [nzLabel]="client.label" [nzValue]="client.value"></nz-option>
        </nz-select>
      </nz-form-item>
    </div>

    <div nz-col [nzSpan]="8">
      <nz-form-item nzFlex>
        <nz-form-label for="pickType" [nzSm]="3" [nzXs]="3">
          {{'pick.type' | translate}}
        </nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input name="pickType" id="pickType" formControlName="pickType" />
        </nz-form-control>
      </nz-form-item>
    </div>


    <div nz-col [nzSpan]="8">
      <nz-form-item nzFlex>
        <label nz-checkbox formControlName="enabled" [nzIndeterminate]="searchByEnabledIndeterminate">
          <span>
            {{'enabled' | translate}}</span>
        </label>
      </nz-form-item>
    </div>

  </div>
  <div nz-row>
    <div nz-col [nzSpan]="24" class="search-area">
      <button nz-button [nzType]="'primary'" (click)="search()">{{'search' | translate}}</button>
      <button nz-button (click)="resetForm()">{{'clear' | translate}}</button>
    </div>
  </div>
</form>

<!-- Table to Display the result  -->
<div class="search-result-list">
  <nz-table #rowSelectionTable nzShowSizeChanger [nzData]="listOfAllCartonizationConfiguration"
    (nzCurrentPageDataChange)="currentPageDataChange($event)" [nzFooter]="tableFoot">
    <thead >
      <tr>
        
        <th
            *ngFor="let column of listOfColumns"
            [nzShowSort]="column.showSort"
            [nzSortOrder]="column.sortOrder"
            [nzSortFn]="column.sortFn"
            [nzSortDirections]="column.sortDirections"
            [nzFilterMultiple]="column.filterMultiple"
            [nzFilters]="column.listOfFilter"
            [nzFilterFn]="column.filterFn"        
            [nzShowFilter]="column.showFilter"
          >
            {{ column.name | translate }}
          </th> 
          
        <th>
          {{'action' | translate}}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of rowSelectionTable.data"> 
        <td>{{ data.sequence }}</td>
        <td>{{ data.client?.name }}</td>
        <td>{{ 'PICK-TYPE-' + data.pickType | translate }}</td>
        <td>{{ data.groupRules }}</td>
        <td>{{ data.enabled + '' | translate}}</td>
        <td>

          <button nz-button (click)="change(data)">{{'modify' | translate}}</button>
        </td>
      </tr>
    </tbody>
  </nz-table>
</div>


<ng-template #tableFoot>
  <div nz-row nzType="flex" nzJustify="start">
    <a nz-button nzType="primary" routerLink="/outbound/cartonization-configuration/maintenance"
      routerLinkActive="active">
      {{'add' | translate}}
    </a>

  </div>
</ng-template>
