<page-header></page-header>

<nz-spin [nzSpinning]="isSpinning" [nzSize]="'large'">
  
<nz-tabset>
  <nz-tab nzTitle="{{ 'inventory-snapshot.configuration' | i18n }}">
    <app-inventory-inventory-snapshot-configuration>
    </app-inventory-inventory-snapshot-configuration>
  </nz-tab>

  <nz-tab nzTitle="{{ 'inventory.configuration' | i18n }}">
        
    <div nz-row [nzGutter]="24">
      <div nz-col [nzSpan]="12" *ngIf="inventoryConfigurationMap.has(inventoryConfigurationTypes.LPN_VALIDATION_RULE)">
          <nz-form-item nzFlex>
              <nz-form-label [nzSpan]="6">
                  {{ 'lpn-validation-rule' | i18n }}
              </nz-form-label>
              <nz-form-control [nzSpan]="18">
                  <input nz-input [(ngModel)]="inventoryConfigurationMap.get(inventoryConfigurationTypes.LPN_VALIDATION_RULE)!.stringValue" />
                  
              </nz-form-control>
          </nz-form-item>
      </div>
    </div> 


    <div nz-row nzType="flex" nzJustify="start">
      <button nz-button nzType="primary" (click)="saveConfiguration()">
          {{ 'confirm' | i18n }}
      </button>
    </div>
  </nz-tab>
</nz-tabset>

</nz-spin>
