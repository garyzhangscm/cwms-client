<page-header [title]="pageTitle" [breadcrumb]="breadcrumb" [action]="returnLink"> </page-header>
<ng-template #returnLink>
  <a routerLink="/common/unit-of-measure" routerLinkActive="active">{{
    'return' | translate
  }}</a>
</ng-template>
<ng-template #breadcrumb>
  <nz-breadcrumb>
    <nz-breadcrumb-item>
      <a routerLink="/" routerLinkActive="active">{{ 'breadcrumb.home' | translate }}</a>
    </nz-breadcrumb-item>
    <nz-breadcrumb-item><a>{{ 'breadcrumb.main' | translate }}</a></nz-breadcrumb-item>
    <nz-breadcrumb-item><a>{{ 'breadcrumb.common' | translate }}</a></nz-breadcrumb-item>
    <nz-breadcrumb-item><a routerLink="/common/unit-of-measure" routerLinkActive="active">{{
        'breadcrumb.unit-of-measure' | translate
      }}</a></nz-breadcrumb-item>
    <nz-breadcrumb-item><a>{{ pageTitle }}</a></nz-breadcrumb-item>
  </nz-breadcrumb>
</ng-template>

<div nz-row style="padding: 50px">
  <div nz-col nzSpan="12" nzOffset="6">
    <nz-steps [nzCurrent]="1" [nzSize]="'default'" (nzIndexChange)="onStepIndexChange($event)">
      <nz-step nzTitle="{{ 'steps.basic-info.title' | translate }}"
        nzDescription="{{ 'steps.unit-of-measure.basic-info.description' | translate }}">
      </nz-step>
      <nz-step nzTitle="{{ 'steps.confirm.title' | translate }}"
        nzDescription="{{ 'steps.confirm.description' | translate }}">
      </nz-step>
    </nz-steps>
  </div>
</div>


<ng-container>
  <nz-card nzTitle="{{ currentUnitOfMeasure.name }}" [nzActions]="[actionSave]">
    <nz-descriptions nzBordered>

      <nz-descriptions-item nzTitle="{{'name' | translate}}">
        {{currentUnitOfMeasure.name}}
      </nz-descriptions-item>
      <nz-descriptions-item nzTitle="{{'description' | translate}}" nzSpan="2">
        {{currentUnitOfMeasure.description}}
      </nz-descriptions-item>

    </nz-descriptions>
  </nz-card>
</ng-container>


<ng-template #actionSave>
  <button nz-button nzType="primary" (click)="saveUnitOfMeasure()">{{ 'confirm' | translate}}</button>
</ng-template>
