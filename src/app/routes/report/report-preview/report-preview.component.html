<page-header [title]="pageTitle" [breadcrumb]="breadcrumb" [action]="returnTpl"></page-header>
<ng-template #breadcrumb>
  <nz-breadcrumb>
    <nz-breadcrumb-item>
      <a routerLink="/" routerLinkActive="active">{{ 'breadcrumb.home' | i18n }}</a>
    </nz-breadcrumb-item>
    <nz-breadcrumb-item><a>{{ 'menu.main' | i18n }}</a></nz-breadcrumb-item>
    <nz-breadcrumb-item><a>{{ 'menu.main.report' | i18n }}</a></nz-breadcrumb-item>
    <nz-breadcrumb-item><a routerLink="/report/report" routerLinkActive="active">{{
        'menu.main.report.report' | i18n
        }}</a></nz-breadcrumb-item>
  </nz-breadcrumb>
</ng-template>

<ng-template #returnTpl>
  <a (click)="back()">
    {{ 'return' | i18n }}
  </a>
</ng-template>

<div class="container">
  <pdf-viewer [src]="pdfUrl" style="height: 300px"></pdf-viewer>
  <div nz-row nzType="flex" nzJustify="center">

    <cwms-common-print-button [printingInProcess]="printingInProcess" [allowPreview]=false (print)="printReport($event)"
      (preview)="previewReport()">
    </cwms-common-print-button>
    <nz-divider nzType="vertical"></nz-divider>
    <a [href]="pdfUrl" target="_blank" rel="noopener noreferrer">
      {{ 'report.download' | i18n}}
    </a>
  </div>
</div>
