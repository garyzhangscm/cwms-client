<page-header></page-header>

<!-- Form to query the result  -->
<form nz-form [formGroup]="searchForm" class="ant-advanced-search-form">
  <div nz-row [nzGutter]="12">
    <div nz-col [nzSpan]="8">
      <nz-form-item nzFlex>
        <nz-form-label for="name" [nzSm]="6" [nzXs]="14">
          {{ 'report.name' | translate }}
        </nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input name="name" id="name" formControlName="name" />
        </nz-form-control>
      </nz-form-item>
    </div>

    <div nz-col [nzSpan]="8">
      <nz-form-item nzFlex>
        <label nz-checkbox formControlName="companySpecific">
          <span> {{ 'report.companySpecific' | translate }}</span>
        </label>

        
      </nz-form-item>
    </div>
    
    <div nz-col [nzSpan]="8">
      <nz-form-item nzFlex>
        
        <label nz-checkbox formControlName="warehouseSpecific">
          <span> {{ 'report.warehouseSpecific' | translate }}</span>
        </label>

      </nz-form-item>
    </div>
  </div>
  

  <div nz-row>
    <div nz-col [nzSpan]="24" class="search-area">
      <button nz-button [nzType]="'primary'" (click)="search()">
        {{ 'search' | translate }}
      </button>
      <button nz-button (click)="resetForm()">{{ 'clear' | translate }}</button>
    </div>
  </div>
</form>

<!-- Table to Display the result  -->
<div class="search-result-list">

  <nz-table nzShowSizeChanger nzShowPagination [nzData]="listOfAllReports"  
  (nzCurrentPageDataChange)="currentPageDataChange($event)" #reportTable>
    <thead >
      <tr>
         
        <th
            *ngFor="let column of listOfColumns"
            [nzShowSort]="column.showSort"
            [nzSortOrder]="column.sortOrder"
            [nzSortFn]="column.sortFn"
            [nzSortDirections]="column.sortDirections"
            [nzFilterMultiple]="column.filterMultiple"
            [nzFilters]="column.listOfFilter"
            [nzFilterFn]="column.filterFn"        
            [nzShowFilter]="column.showFilter"
          >
            {{ column.name | translate }}
          </th> 


          

        <th>
          {{ 'action' | translate }}
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of reportTable.data"> 
        <td>{{ data.name }}</td>
        <td>{{ data.description }}</td>
        <td>{{ data.companyId}}</td>
        <td>{{ data.warehouseId }}</td>
        <td>{{ data.type }}</td>
        <td>{{ 'REPORT-ORIENTATION_' + data.reportOrientation | translate }}</td>
        <td>{{ data.fileName }}</td>
        <td nzRight>

          <button nz-button nzType="primary" routerLink="/report/report-maintenance" routerLinkActive="active"
            [queryParams]="{id : data.id}">
            {{ 'modify' | translate }}
          </button>

        </td>
      </tr>

    </tbody>
  </nz-table> 
</div>

<ng-template #tableFoot>
  <div nz-row nzType="flex" nzJustify="start" *ngIf="searchResult != ''">
    {{searchResult}}
  </div>
</ng-template>
