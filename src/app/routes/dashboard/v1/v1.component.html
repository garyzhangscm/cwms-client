<div class="alain-default__content-title">
  <h1>
    Dashboard
    <small>Welcome !</small>
  </h1>
</div>
<quick-menu>
  <nz-list [nzBordered]="false" [nzSplit]="false">
    <nz-list-item>
      <a routerLink="/">Home</a>
    </nz-list-item>
    <nz-list-item>
      <a routerLink="/widgets">Widgets</a>
    </nz-list-item>
    <nz-list-item>
      <a routerLink="/style/typography">typography</a>
    </nz-list-item>
    <nz-list-item>
      <a routerLink="/style/gridmasonry">gridmasonry</a>
    </nz-list-item>
    <nz-list-item>
      <a routerLink="/pro/result/success">success result</a>
    </nz-list-item>
  </nz-list>
</quick-menu>

<div nz-row> 
      <label nz-checkbox [(ngModel)]="showDailySummay" (ngModelChange)="showDailySummayChanged()" >{{ "daily" | i18n}}</label>  
      <label nz-checkbox [(ngModel)]="showMonthlySummay" (ngModelChange)="showMonthlySummayChanged()">{{ "monthly" | i18n}}</label>   
      <label nz-checkbox [(ngModel)]="showYearlySummay" (ngModelChange)="showYearlySummayChanged()">{{ "yearly" | i18n}}</label>    
</div>
<nz-card  nzTitle="{{'billable-request.daily-summary' | i18n}} - ({{ todayDate }})"  *ngIf="showDailySummay" style="margin-top: 10px;">
  
  <nz-spin [nzSpinning]="dailySummayLoading">
    <div nz-row nzGutter="16">

      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
          <g2-pie
            #dailyWebAPIEndpointPie
            [hasLegend]="true"
            title="{{'totalWebAPIEndpoint' | i18n}}"
            subTitle="{{'totalWebAPIEndpoint' | i18n}}"
            [total]="dailyWebAPIEndpointTotal" 
            [data]="dailyWebAPIEndpointPieData"
            height="300"
            repaint="true"
            (clickItem)="handleClick($event)"
          ></g2-pie>
      </div>
      
      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
        <g2-pie
          #dailyTransactionPie
          [hasLegend]="true"
          title="{{'totalTransaction' | i18n}}"
          subTitle="{{'totalTransaction' | i18n}}"
          [total]="dailyTransactionTotal" 
          [data]="dailyTransactionPieData"
          height="300"
          repaint="true"
          (clickItem)="handleClick($event)"
        ></g2-pie>
      </div>
    
      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
        <g2-pie
          #dailyCostPie
          [hasLegend]="true"
          title="{{'totalCost' | i18n}}"
          subTitle="{{'totalCost' | i18n}}"
          [total]="dailyCostTotal" 
          [data]="dailyCostData"
          height="300"
          repaint="true"
          (clickItem)="handleClick($event)"
        ></g2-pie>
      </div>
    </div>
        
  </nz-spin>
</nz-card>

<nz-card  nzTitle="{{'billable-request.monthly-summary' | i18n}} - ({{ thisMonth }})"  *ngIf="showMonthlySummay" style="margin-top: 10px;">
  <nz-spin [nzSpinning]="monthlySummayLoading">
    <div nz-row nzGutter="16">

      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
          <g2-pie
            #monthlyWebAPIEndpointPie
            [hasLegend]="true"
            title="{{'totalWebAPIEndpoint' | i18n}}"
            subTitle="{{'totalWebAPIEndpoint' | i18n}}"
            [total]="monthlyWebAPIEndpointTotal" 
            [data]="monthlyWebAPIEndpointPieData"
            height="300"
            repaint="true"
            (clickItem)="handleClick($event)"
          ></g2-pie>
      </div>
      
      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
        <g2-pie
          #monthlyTransactionPie
          [hasLegend]="true"
          title="{{'totalTransaction' | i18n}}"
          subTitle="{{'totalTransaction' | i18n}}"
          [total]="monthlyTransactionTotal" 
          [data]="monthlyTransactionPieData"
          height="300"
          repaint="true"
          (clickItem)="handleClick($event)"
        ></g2-pie>
      </div>
    
      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
        <g2-pie
          #monthlyCostPie
          [hasLegend]="true"
          title="{{'totalCost' | i18n}}"
          subTitle="{{'totalCost' | i18n}}"
          [total]="monthlyCostTotal" 
          [data]="monthlyCostData"
          height="300"
          repaint="true"
          (clickItem)="handleClick($event)"
        ></g2-pie>
      </div>
    </div>
        
  </nz-spin>
 
</nz-card>

<nz-card  nzTitle="{{'billable-request.yearly-summary' | i18n}} - ({{ thisYear }})" *ngIf="showYearlySummay" style="margin-top: 10px;">
  <nz-spin [nzSpinning]="yearlySummayLoading">

            height="300"

          ></g2-pie>
      </div>
      
      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">
        <g2-pie

          title="{{'totalTransaction' | i18n}}"

          [total]="yearlyTransactionTotal"

      <div nz-col nzXs="24" nzSm="12" nzMd="6" class="mb-md">

        ></g2-pie>
      </div>
    </div>
        
  </nz-spin>
 
</nz-card>
