<page-header></page-header>

<nz-card>

  <form nz-form class="query-form">


    <nz-form-item nzFlex>
      <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="currentGridId">
        {{ 'location-group' | translate }}
      </nz-form-label>
      <nz-form-control [nzSm]="14" [nzXs]="24">
        <nz-select [ngModel]="currentGridId" (ngModelChange)="gridChanged($event)" name="currentGridId">
          <nz-option *ngFor="let grid of availableGrids" [nzLabel]="grid.locationGroup?.name"
            [nzValue]="grid.locationGroupId">
          </nz-option>
        </nz-select>
      </nz-form-control>
    </nz-form-item>
    <nz-form-item nzFlex>
      <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="inventoryId">
        id
      </nz-form-label>
      <nz-form-control [nzSm]="14" [nzXs]="24">
        <input type="text" nz-input [(ngModel)]="inventoryId" name="inventoryId"
          (keyup.enter)="onUserInputInventoryIdEvent()" />
      </nz-form-control>
    </nz-form-item>

    <nz-form-item nzFlex>
      <nz-form-label [nzSm]="6" [nzXs]="24" nzFor="itemName">
        {{ 'item' | translate }}
      </nz-form-label>
      <nz-form-control [nzSm]="14" [nzXs]="24">
        <input type="text" nz-input [ngModel]="itemName" name="itemName" #itemNameTextBox
          (keyup.enter)="onUserInputItemNameEvent($event.target.value)" />
      </nz-form-control>
    </nz-form-item>

  </form>
</nz-card>


<!-- Table to Display the result  -->
<div class="grid">
  <table>
    <tr *ngFor="let gridRow of gridRows">
      <td *ngFor="let cell of gridRow.cells" [colSpan]="cell.columnSpan" [ngClass]="cell.status">
        <div (click)="gridCellClicked(cell.locationName)">{{ cell.locationName}}</div>
      </td>
    </tr>
  </table>
</div>

<div class="search-result-list" *ngIf="listOfDistributionWork?.length > 0">
  <nz-table #rowSelectionTable nzShowSizeChanger [nzData]="listOfDistributionWork">
    <thead>
      <tr>
        <th>
          {{'item' | translate}}</th>
        <th>
          {{'location' | translate}}</th>
        <th>
          {{'quantity' | translate}}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of rowSelectionTable.data">
        <td>{{data.itemName}}</td>
        <td>{{data.gridLocationName}}</td>
        <td>{{data.quantity}}</td>
      </tr>
    </tbody>
  </nz-table>
</div>
