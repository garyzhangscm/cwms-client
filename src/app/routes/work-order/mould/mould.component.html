<page-header [title]="'page.mould.header.title' | translate"> </page-header>

<nz-spin  [nzSpinning]="isSpinning"></nz-spin>
<!-- Form to query the result  -->
<form nz-form [formGroup]="searchForm" class="ant-advanced-search-form">
  <div nz-row [nzGutter]="24">
    <div nz-col [nzSpan]="12">
      <nz-form-item nzFlex>
        <nz-form-label for="name" [nzSm]="3" [nzXs]="3">
          {{ 'name' | translate }}
        </nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input name="name" id="name" formControlName="name" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="12">
      <nz-form-item nzFlex>
        <nz-form-label for="description" [nzSm]="3" [nzXs]="3">
          {{ 'description' | translate }}
        </nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input name="description" id="description" formControlName="description" />
        </nz-form-control>
      </nz-form-item>
    </div>
  </div>
  <div nz-row>
    <div nz-col [nzSpan]="24" class="search-area">
      <button nz-button [nzType]="'primary'" (click)="search()"  >
        {{ 'search' | translate }}
      </button>
      <button nz-button (click)="resetForm()">{{ 'clear' | translate }}</button>
    </div>
  </div>
</form>

<!-- Table to Display the result  -->
<div class="search-result-list">
  <nz-table #rowSelectionTable nzShowSizeChanger nzShowPagination [nzData]="listOfAllMoulds" [nzFooter]="tableFoot"
  (nzCurrentPageDataChange)="currentPageDataChange($event)">
    <thead  >
      <tr>
         
        <th
            *ngFor="let column of listOfColumns"
            [nzShowSort]="column.showSort"
            [nzSortOrder]="column.sortOrder"
            [nzSortFn]="column.sortFn"
            [nzSortDirections]="column.sortDirections"
            [nzFilterMultiple]="column.filterMultiple"
            [nzFilters]="column.listOfFilter"
            [nzFilterFn]="column.filterFn"        
            [nzShowFilter]="column.showFilter"
          >
            {{ column.name | translate }}
          </th> 
           
          
        <th>
          {{ 'action' | translate }}
        </th>
      </tr>
    </thead>
    <tbody> 
        <tr *ngFor="let data of rowSelectionTable.data"> 
          
          <td>{{ data.name }}</td>
          <td>{{ data.description }}</td> 
          <td>
            <a routerLink="/work-order/mould/maintenance"
            [queryParams]="{id: data.id}"
            routerLinkActive="active"> {{ 'modify' | translate }}</a> 
            
            <nz-divider nzType="vertical"></nz-divider>
            <button nz-button nzType="danger" (click)="removeMould(data)" >
              {{'delete' | translate}}
            </button>
          </td>
        </tr> 
    </tbody>
  </nz-table>
  <div nz-row nzJustify="start" style="padding: 15px;" nzAlign="middle">

    <a nz-button routerLink="/work-order/mould/maintenance"
      routerLinkActive="active">{{ 'new' | translate }}</a>
    <nz-divider nzType="vertical"></nz-divider>
  </div>
</div>

<ng-template #tableFoot>
  <div nz-row nzType="flex" nzJustify="start" *ngIf="searchResult != ''">
    {{searchResult}}
  </div>
</ng-template>
