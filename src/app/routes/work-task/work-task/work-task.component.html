<page-header></page-header>


<nz-spin [nzSpinning]="isSpinning" [nzSize]="'large'">
    <!-- Form to query the result  -->
    <form nz-form [formGroup]="searchForm" class="ant-advanced-search-form">
      <div nz-row [nzGutter]="24">
        <div nz-col [nzSpan]="8">
          <nz-form-item nzFlex>
            <nz-form-label for="number" [nzSpan]="8">
              {{ 'number' | i18n }}
            </nz-form-label>
            <nz-form-control [nzSpan]="16">
              <input nz-input name="number" id="number" formControlName="number" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzSpan]="8">
          <nz-form-item nzFlex>
            <nz-form-label for="type" [nzSpan]="8">
              {{ 'type' | i18n }}
            </nz-form-label>
            <nz-form-control [nzSpan]="16">
              <nz-select formControlName="type">
                <nz-option
                  *ngFor="let type of workTaskTypes | keys"
                  [nzValue]="type.key"
                  [nzLabel]="type.key"
                  ></nz-option>
                 </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        
        
        <div nz-col [nzSpan]="8">
            <nz-form-item nzFlex>
              <nz-form-label for="status" [nzSpan]="8">
                {{ 'status' | i18n }}
              </nz-form-label>
              <nz-form-control [nzSpan]="16">
                <nz-select formControlName="status">
                  <nz-option
                    *ngFor="let status of workTaskStatus | keys"
                    [nzValue]="status.key"
                    [nzLabel]="status.key"
                    ></nz-option>
                   </nz-select>
              </nz-form-control>
            </nz-form-item>
          </div>
      </div>  
  
      <div nz-row>
        <div nz-col [nzSpan]="24" class="search-area">
          <button nz-button [nzType]="'primary'" (click)="search()">
            {{ 'search' | i18n }}
          </button>
          <button nz-button (click)="resetForm()">{{ 'clear' | i18n }}</button>
        </div>
      </div>
    </form>
  
    <!-- Table to Display the result  -->
  
    <div class="search-result-list"> 
      
      <st #st [data]="workTasks"  [columns]="columns"  [scroll]="{ x: '3355px' }">   
        <!--   action colummn  -->  
        <ng-template st-row="actionColumn" let-workTask let-index="index"> 
          
          <nz-list>
            <nz-list-item>          
              <button nz-button nz-dropdown [nzDropdownMenu]="menu" nzType="primary">
                {{ 'action' | i18n }} <i nz-icon nzType="down"></i></button>
              <nz-dropdown-menu #menu="nzDropdownMenu">
                <ul nz-menu> 
  
                  <li nz-menu-item 
                  *ngIf="!userPermissionMap.has('assign-user') || userPermissionMap.get('assign-user')">
                    <a (click)="assignUser(workTask)">
                      {{ 'assign-user' | i18n }}</a> 
                  </li>  
                </ul>
              </nz-dropdown-menu>
            </nz-list-item>  
          </nz-list>
          
        </ng-template>
          
        
    </st>
      
    <div nz-row nzType="flex" nzJustify="start"  style="padding: 15px;" *ngIf="searchResult != ''">
      {{searchResult}}
    </div> 
  </div> 
  
</nz-spin>
