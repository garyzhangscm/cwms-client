<page-header [title]="pageTitle" [breadcrumb]="breadcrumb" [action]="returnLink"> </page-header>


<nz-spin [nzSpinning]="isSpinning" [nzSize]="'large'">
  <ng-template #returnLink>
    <a routerLink="/work-order/work-order" routerLinkActive="active"
      [queryParams]="{ number: currentWorkOrder?.number }">{{ 'return' | i18n }}</a>
  </ng-template>
  <ng-template #breadcrumb>
    <nz-breadcrumb>
      <nz-breadcrumb-item>
        <a routerLink="/" routerLinkActive="active">{{ 'breadcrumb.home' | i18n }}</a>
      </nz-breadcrumb-item>
      <nz-breadcrumb-item><a>{{ 'breadcrumb.main' | i18n }}</a></nz-breadcrumb-item>
      <nz-breadcrumb-item><a routerLink="/work-order" routerLinkActive="active">{{
          'breadcrumb.work-order' | i18n
          }}</a></nz-breadcrumb-item>
      <nz-breadcrumb-item><a>{{ pageTitle }}</a></nz-breadcrumb-item>
    </nz-breadcrumb>
  </ng-template>

  <nz-descriptions nzTitle="{{ 'work-order' | i18n}}" nzBordered="true">
  
    <nz-descriptions-item nzTitle="{{ 'work-order.number' | i18n}}">
      {{ currentWorkOrder?.number}}
    </nz-descriptions-item>
    
    <nz-descriptions-item nzTitle="{{ 'item' | i18n}}" nzSpan="2">
      {{ currentWorkOrder?.item?.name}}
    </nz-descriptions-item>

    
    <nz-descriptions-item nzTitle="{{ 'start-lpn' | i18n}}">
      <input nz-input  [(ngModel)]="startLPN" />
  
    </nz-descriptions-item>
    <nz-descriptions-item nzTitle="{{ 'quantity' | i18n}}">
      <input nz-input  [(ngModel)]="quantity" />
  
    </nz-descriptions-item>
    <nz-descriptions-item nzTitle="{{ 'label-count' | i18n}}">
      <input nz-input  [(ngModel)]="labelCount" />
  
    </nz-descriptions-item>

  </nz-descriptions>
  <div nz-row style="padding-top: 20px;">
    
    <cwms-common-print-button style='padding-left: 20px; '
      (print)="printLPNLabels($event)"
      (preview)="previewLPNLabel()">
    </cwms-common-print-button>
  </div>
  </nz-spin>
