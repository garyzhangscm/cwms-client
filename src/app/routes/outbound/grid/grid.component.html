<page-header></page-header>

<nz-card [nzExtra]="configTemplate">

  <form nz-form [formGroup]="gridQueryForm" class="query-form">


    <div nz-row [nzGutter]="24">
      <div nz-col [nzSpan]="8">
        <nz-form-item nzFlex>
          <nz-form-label>
            {{ 'location-group' | translate }}
          </nz-form-label>
          <nz-form-control [nzSm]="14" [nzXs]="24">
            <nz-select (ngModelChange)="gridChanged($event)" formControlName="locationGroupId">
              <nz-option *ngFor="let grid of availableGrids" [nzLabel]="grid.locationGroup?.name"
                [nzValue]="grid.locationGroupId">
              </nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

    <div nz-row [nzGutter]="24">
      <div nz-col [nzSpan]="5">
        <nz-form-item nzFlex>
          <nz-form-label>
            id
          </nz-form-label>
          <nz-form-control>
            <input type="text" nz-input formControlName="inventoryId" (keyup.enter)="onUserInputInventoryIdEvent()" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div nz-col [nzSpan]="5">

        <nz-form-item nzFlex>
          <nz-form-label>
            {{ 'item' | translate }}
          </nz-form-label>
          <nz-form-control>
            <input type="text" nz-input #itemNameTextBox formControlName="itemName"
              (keyup.enter)="onUserInputItemNameEvent()" />
          </nz-form-control>
        </nz-form-item>
      </div>
    </div>

  </form>
</nz-card>

<ng-template #configTemplate>
  <label nz-checkbox [ngModel]="showDistributionWork" (ngModelChange)="showDistributionWorkChanged($event)">
    <span>{{'grid.showDistributionWork' | translate}}</span>
  </label>
  <label nz-checkbox [(ngModel)]="refresh">
    <span>{{'grid.refresh' | translate}}</span>
  </label>
</ng-template>

<!-- Table to Display the result  -->
<div nz-row [nzGutter]="8">
  <div nz-col [nzSpan]="gridDisplaySpan">

    <table>
      <tr *ngFor="let gridRow of gridRows">
        <td *ngFor="let cell of gridRow.cells" [colSpan]="cell.columnSpan" [ngClass]="cell.status">
          <!--
        <nz-card [nzExtra]="showDetailInformationTemplate" [nzActions]="progressTemplate">

          <div (click)="gridCellClicked(cell.gridLocationConfigurationId)">
            {{ cell.locationName}}
          </div>
        </nz-card>
        <ng-template #showDetailInformationTemplate>
          <a (click)="showDetailInformation(cell.locationName)">
            <nz-badge [nzCount]="109" [nzStyle]="{ backgroundColor: '#52c41a' }"></nz-badge>
          </a>
        </ng-template>
        <ng-template #progressTemplate>
          <nz-progress [nzPercent]="cell.progress"></nz-progress>
        </ng-template>


        -->
          <div class="grid-cell-inv">
            <a (click)="showPendingInventory(cell.gridLocationConfigurationId)" class="badge">
              <nz-badge [nzCount]="cell.pendingQuantity" nzShowZero>{{'pending' | translate}}
              </nz-badge>
            </a>
            <a (click)="showArrivedQuantity(cell.gridLocationConfigurationId)" class="badge">
              <nz-badge [nzCount]="cell.arrivedQuantity" [nzStyle]="{ backgroundColor: '#52c41a' }" nzShowZero>
                {{'processed' | translate}}
              </nz-badge>
            </a>
          </div>

          <div class="grid-cell" (click)="gridCellClicked(cell.gridLocationConfigurationId)">
            {{ cell.locationName}}
          </div>
          <div class="grid-cell-progress">
            <nz-progress [nzPercent]="cell.progress"></nz-progress>
          </div>

        </td>
      </tr>
    </table>
  </div>
  <div nz-col [nzSpan]="8" *ngIf="listOfDistributionWork?.length > 0">

    <nz-table #rowSelectionTable nzShowSizeChanger [nzData]="listOfDistributionWork">
      <thead>
        <tr>
          <th>
            {{'item' | translate}}</th>
          <th>
            {{'location' | translate}}</th>
          <th>
            {{'quantity' | translate}}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let data of rowSelectionTable.data">
          <td>{{data.itemName}}</td>
          <td>{{data.gridLocationName}}</td>
          <td>{{data.quantity}}</td>
        </tr>
      </tbody>
    </nz-table>
  </div>

</div>


<div class="grid">
</div>


<div *ngIf="listOfDistributionWork?.length > 0">
</div>
