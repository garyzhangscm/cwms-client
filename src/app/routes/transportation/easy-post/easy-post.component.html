<page-header></page-header>


<nz-spin [nzSpinning]="isSpinning" [nzSize]="'large'">
    <nz-card>        
        <div nz-row [nzGutter]="24"> 
          <div nz-col [nzSpan]="12">
            <nz-form-item>
                <nz-form-label [nzSpan]="6">
                {{ 'apiKey' | i18n }}
                </nz-form-label>
                <nz-form-control [nzSpan]="18">
                    <input nz-input [(ngModel)]="currentEasyPostConfiguration!.apiKey" /> 

                </nz-form-control>
            </nz-form-item>
          </div>   
          <div nz-col [nzSpan]="12">
            <nz-form-item>
                <nz-form-label [nzSpan]="6">
                {{ 'webhookSecret' | i18n }}
                </nz-form-label>
                <nz-form-control [nzSpan]="18">
                    <input nz-input [(ngModel)]="currentEasyPostConfiguration!.webhookSecret" /> 

                </nz-form-control>
            </nz-form-item>
          </div>   
        </div>   
    </nz-card>

    <div nz-row nzJustify="start" style="padding: 15px;" nzAlign="middle">
        <button nz-button nzType="primary" (click)="confirm()" >
            <span> {{ 'confirm' | i18n }}</span>
          </button>
    </div>

</nz-spin>
