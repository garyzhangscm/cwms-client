<page-header [title]="'page.production-line.header.title' | translate"> </page-header>

<!-- Form to query the result  -->
<form nz-form [formGroup]="searchForm" class="ant-advanced-search-form">
  <div nz-row [nzGutter]="24">
    <div nz-col [nzSpan]="12">
      <nz-form-item nzFlex>
        <nz-form-label for="location_group_type" [nzSm]="3" [nzXs]="3">
          {{ 'location-group-type' | translate }}
        </nz-form-label>
        <nz-select nzMode="tags" formControlName="taggedProductionLine" [(ngModel)]="selectedProductionLine">
          <nz-option *ngFor="let productionLine of availableProductionLines" [nzLabel]="productionLine.label"
            [nzValue]="productionLine.value"></nz-option>
        </nz-select>
      </nz-form-item>
    </div>

  </div>
  <div nz-row>
    <div nz-col [nzSpan]="24" class="search-area">
      <button nz-button [nzType]="'primary'" (click)="search()" [nzLoading]="searching">
        {{ 'search' | translate }}
      </button>
      <button nz-button (click)="resetForm()">{{ 'clear' | translate }}</button>
    </div>
  </div>
</form>

<!-- Table to Display the result  -->
<div class="search-result-list">
  <nz-table #rowSelectionTable nzShowSizeChanger nzShowPagination 
  (nzCurrentPageDataChange)="currentPageDataChange($event)"
  [nzData]="listOfAllProductionLine"
    [nzFooter]="tableFoot">
    <thead>
      <tr>
        <th
            [nzSelections]="listOfSelection"
            [(nzChecked)]="checked"
            [nzIndeterminate]="indeterminate"
            (nzCheckedChange)="onAllChecked($event)"
            nzWidth="60px"
          ></th>
        <th
            *ngFor="let column of listOfColumns"
            [nzShowSort]="column.showSort"
            [nzSortOrder]="column.sortOrder"
            [nzSortFn]="column.sortFn"
            [nzSortDirections]="column.sortDirections"
            [nzFilterMultiple]="column.filterMultiple"
            [nzFilters]="column.listOfFilter"
            [nzFilterFn]="column.filterFn"        
            [nzShowFilter]="column.showFilter"
          >
            {{ column.name | translate }}
          </th> 

          
        <th>
          {{ 'action' | translate }}
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let data of rowSelectionTable.data">
        
        <td
        [nzChecked]="setOfCheckedId.has(data.id)"
        (nzCheckedChange)="onItemChecked(data.id, $event)"
      ></td>
        <td>{{ data.name }}</td>
        <td>{{ data.productionLineLocation?.name }}</td>
        <td>{{ data.inboundStageLocation?.name }}</td>
        <td>{{ data.outboundStageLocation?.name }}</td>
        <td>{{ data.workOrderExclusiveFlag }}</td>
        <td>{{ data.enabled }}</td>
        <td>
          <button nz-button nzType="primary" (click)="disableProductionLine(data, true)" *ngIf="data.enabled">
            {{ 'disable' | translate }}
          </button>
          <button nz-button nzType="primary" (click)="disableProductionLine(data, false)" *ngIf="!data.enabled">
            {{ 'enable' | translate }}
          </button>
        </td>

      </tr>
    </tbody>
  </nz-table>
</div>


<ng-template #tableFoot>
  <div nz-row nzType="flex" nzJustify="start" *ngIf="searchResult != ''">
    {{searchResult}}
  </div>
</ng-template>
